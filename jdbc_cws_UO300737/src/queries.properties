# TINVOICES
TINVOICES_SELECT_LAST_NUMBER = SELECT MAX(number) FROM TInvoices
TINVOICES_INSERT = INSERT INTO TInvoices \
                   (id, number, date, vat, amount, state, version, \
                   createdAt, updatedAt, entityState) \
                   VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)

TINVOICES_FIND_BY_ID = SELECT ID, NUMBER, DATE, VAT, AMOUNT, STATE, VERSION \
                       FROM TINVOICES WHERE ID = ?

TINVOICES_FIND_BY_NUMBER = SELECT ID, NUMBER, DATE, VAT, AMOUNT, STATE, VERSION \
                           FROM TINVOICES WHERE NUMBER = ?

TINVOICES_FIND_ALL = SELECT ID, NUMBER, DATE, VAT, AMOUNT, STATE, VERSION \
                     FROM TINVOICES

# TMECHANICS
TMECHANICS_ADD = insert into TMechanics(id, nif, name, surname, version, \
                 createdAt, updatedAt, entityState) \
                 values (?, ?, ?, ?, ?, ?, ?, ?)
TMECHANICS_DELETE = delete from TMechanics where id = ?

MECHANICS_EXISTS = SELECT 1 FROM TMECHANICS WHERE ID = ?

TMECHANICS_FINDMECHANICSWITHVALIDCONTRACT = SELECT m.* FROM TMECHANICS m \
	JOIN TCONTRACTS c ON m.ID = c.MECHANIC_ID WHERE c.ENDDATE IS NULL;

#TPROFESSIONALGROUPS

TPROFESSIONALGROUPS_ADD = INSERT INTO TPROFESSIONALGROUPS \
						(ID, NAME, PRODUCTIVITYRATE, TRIENNIUMPAYMENT, \
						VERSION, CREATEDAT, UPDATEDAT) VALUES (?, ?, ?, ?, ?, ?, ?);
TPROFESSIONALGROUPS_DELETE = DELETE FROM TPROFESSIONALGROUPS WHERE ID = ?;

TPROFESSIONALGROUPS_UPDATE = UPDATE TPROFESSIONALGROUPS SET NAME = ?, \
	TRIENNIUMPAYMENT = ?, PRODUCTIVITYRATE = ?, \
	UPDATEDAT = ?, VERSION = VERSION + 1 WHERE ID = ? AND VERSION = ?
	
TPROFESSIONALGROUPS_FINDALL = SELECT ID, NAME, TRIENNIUMPAYMENT, \
	PRODUCTIVITYRATE, VERSION FROM TPROFESSIONALGROUPS;
	
TPROFESSIONALGROUPS_FIND_BY_NAME = SELECT ID, NAME, TRIENNIUMPAYMENT, \
	PRODUCTIVITYRATE, VERSION FROM TPROFESSIONALGROUPS WHERE NAME = ?;
	
TPROFESSIONALGROUPS_FIND_BY_ID = SELECT ID, NAME, TRIENNIUMPAYMENT, \
	PRODUCTIVITYRATE, VERSION FROM TPROFESSIONALGROUPS WHERE ID = ?;
	
TCONTRACTS_COUNT_BY_PROFESSIONALGROUP_NAME = SELECT COUNT(*) FROM TCONTRACTS c \
	JOIN TPROFESSIONALGROUPS pg ON c.PROFESSIONALGROUP_ID = pg.ID \
	WHERE UPPER(pg.NAME) = UPPER(?)

TCONTRACTS_COUNT_BY_PROFESSIONALGROUP_ID = SELECT COUNT(*) FROM TCONTRACTS \
										WHERE PROFESSIONALGROUP_ID = ?;


# Dependencies
TMECHANICS_HAS_WORKORDERS=SELECT COUNT(*) FROM TWORKORDERS WHERE MECHANIC_ID = ?

TMECHANICS_HAS_INTERVENTIONS=SELECT COUNT(*) FROM TINTERVENTIONS WHERE MECHANIC_ID = ?

TMECHANICS_HAS_CONTRACT=SELECT COUNT(*) FROM TCONTRACTS WHERE MECHANIC_ID = ?

TMECHANICS_HAS_ACTIVE_CONTRACT=SELECT COUNT(*) FROM TCONTRACTS WHERE MECHANIC_ID = ? \
								AND STATE = 'IN_FORCE'

TCONTRACTS_FIND_ALL_INFORCE = SELECT c.id, c.version, c.mechanic_id, c.contracttype_id, \
	c.professionalgroup_id, c.startdate, c.enddate, c.annualbasesalary, c.taxrate, \
	c.settlement, c.state FROM TContracts c WHERE c.state = 'IN_FORCE'
							
TCONTRACTS_FIND_INFORCE_BY_MECHANIC_NIF = SELECT c.id, m.nif, c.settlement, c.state, \
	COUNT(p.id) AS numPayrolls FROM TContracts c JOIN TMechanics m ON \
	c.mechanic_id = m.id LEFT JOIN TPayrolls p ON p.contract_id = c.id \
	WHERE m.nif = ? AND c.state = 'IN_FORCE' GROUP BY c.id, m.nif, c.settlement, c.state

TCONTRACTS_IS_ACTIVE_BY_PROFESSIONALGROUPID = SELECT COUNT(*) FROM TCONTRACTS \
	WHERE PROFESSIONALGROUP_ID = ?

T_CONTRACTS_GET_ACTIVES_BY_MONTH = SELECT c.ID, c.ANNUALBASESALARY, c.STARTDATE, \
	c.ENDDATE, c.TAXRATE FROM TCONTRACTS c WHERE c.STATE = 'IN_FORCE' AND c.STARTDATE < ?;

TMECHANICS_FIND_BY_NIF = select id, nif, name, surname, version from TMechanics \
                       where nif = ?
TMECHANICS_FINDALL = select id, nif, name, surname, version from TMechanics
                    
TMECHANICS_UPDATE = update TMechanics \
                    set name = ?, surname = ?, updatedat = ?, \
                        version = version + 1 \
                    where id = ? and version = ?
                    
TMECHANICS_FIND_BY_ID = select * from TMechanics where id = ?

# TWORKORDERS
TWORKORDERS_FIND_NOT_INVOICED=SELECT a.ID, a.STATE, a.DATE, a.DESCRIPTION, a.AMOUNT \
FROM TWORKORDERS a \
JOIN TVEHICLES v ON v.ID = a.VEHICLE_ID \
JOIN TCLIENTS  c ON c.ID = v.CLIENT_ID \
WHERE c.NIF = ? \
  AND a.STATE = 'FINISHED' \
  AND a.INVOICE_ID IS NULL \
ORDER BY a.DATE ASC, a.ID ASC

TWORKORDERS_UPDATE_VERSION = update TWorkOrders set version=version+1 where id = ?
TWORKORDERS_FIND_ID_BY_ID = SELECT id FROM TWorkOrders WHERE id = ?
TWORKORDERS_FIND_ID_BY_NIF = SELECT id FROM TWorkOrders WHERE nif = ?
TWORKORDERS_FIND_BY_ID = SELECT ID, STATE, INVOICE_ID, AMOUNT, DATE, DESCRIPTION \
							FROM TWORKORDERS WHERE ID = ?
TWORKORDERS_FIND_ALL = SELECT ID, STATE, INVOICE_ID, AMOUNT, DATE, DESCRIPTION \
							FROM TWORKORDERS						
TWORKORDERS_FIND_BY_NIF = SELECT wo.* FROM TWorkOrders wo JOIN TVehicles v ON \
	wo.vehicle_id = v.id JOIN TClients c ON v.client_id = c.id WHERE c.nif = ? \
	AND wo.state = 'FINISHED' AND wo.invoice_id IS NULL;
WORKORDERS_IDS_BY_RECORD = SELECT iw.WORKORDER_ID FROM TINVOICE_WORKORDERS iw \
							WHERE iw.RECORD_ID = ? ORDER BY iw.POSITION ASC
TINVOICES_FIND_NUMBER_BY_ID = SELECT number FROM TINVOICES WHERE id = ?
TWORKORDERS_FIND_STATUS_BY_ID = SELECT state FROM TWorkOrders WHERE id = ?
TWORKORDERS_FIND_AMOUNT_BY_ID = SELECT amount FROM TWorkOrders WHERE id = ?
TWORKORDERS_UPDATE_INVOICEID = UPDATE TWorkOrders SET invoice_id = ? WHERE id = ?
TWORKORDERS_UPDATE_STATE = UPDATE TWorkOrders SET state = 'INVOICED' WHERE id = ?
TWORKORDERS_UPDATE_TIMESTAMP = UPDATE TWorkOrders SET updatedat = ? WHERE id = ?


#TPAYROLLS

TPAYROLLS_FIND_ALL = SELECT * FROM TPAYROLLS
TPAYROLLS_FIND_BY_ID = SELECT * FROM TPAYROLLS WHERE ID = ?
TPAYROLLS_FIND_BY_MECHANIC_ID = SELECT p.* FROM TPAYROLLS p JOIN TCONTRACTS c ON \
								p.CONTRACT_ID = c.ID WHERE c.MECHANIC_ID = ?

TPAYROLLS_FIND_SUMMARY_BY_PROF_GROUP_NAME = SELECT p.* FROM TPAYROLLS p JOIN \
	TCONTRACTS c ON p.CONTRACT_ID = c.ID JOIN TPROFESSIONALGROUPS pg ON \
	c.PROFESSIONALGROUP_ID = pg.ID WHERE pg.NAME = ?

TPAYROLLS_DELETE_LAST_GENERATED = DELETE FROM TPAYROLLS WHERE DATE BETWEEN ? AND ?

TPAYROLLS_DELETE_LAST_GENERATED_BY_MECHANIC_ID = DELETE FROM TPAYROLLS WHERE ID IN (\
    SELECT P.ID FROM TPAYROLLS P JOIN TCONTRACTS C ON P.CONTRACT_ID = C.ID \
    WHERE C.MECHANIC_ID = ? AND P.DATE BETWEEN ? AND ?);

TPAYROLLS_GENERATE_FOR_PREVIOUS_MONTH = SELECT id, version, contract_id, date, \
	basesalary, extrasalary, productivityearning, trienniumearning, taxdeduction, \
	nicdeduction FROM TPAYROLLS WHERE date >= ? AND date < ?

TPAYROLLS_GENERATE_FOR_PREVIOUS_MONTH_OF = SELECT  p.id, p.version, p.contract_id, \
	p.date, p.basesalary, p.extrasalary, p.productivityearning, p.trienniumearning, \
	p.taxdeduction, p.nicdeduction FROM TPayrolls p WHERE p.date >= ? AND p.date < ?

TPAYROLLS_GENERATED_FOR_MOTH = SELECT COUNT(*) FROM TPayrolls WHERE date >= ? \
	AND date < ?;

TPAYROLLS_INSERT = INSERT INTO TPAYROLLS (ID, VERSION, CONTRACT_ID, DATE, \
	BASESALARY, EXTRASALARY, PRODUCTIVITYEARNING, TRIENNIUMEARNING, TAXDEDUCTION, \
	NICDEDUCTION, CREATEDAT, UPDATEDAT, ENTITYSTATE) \
	VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)

TPAYROLLS_GET_PRODUCTIVITY_RATE_BY_ID = SELECT pg.productivityrate FROM TContracts c \
	JOIN TProfessionalGroups pg ON c.professionalgroup_id = pg.id WHERE c.id = ?

TPAYROLLS_GET_TRIENNIUMPAYMENT_BY_ID = SELECT pg.trienniumPayment FROM TContracts c \
	JOIN TProfessionalGroups pg ON c.professionalgroup_id = pg.id WHERE c.id = ?


TPAYROLLS_GET_INVOICEDAMOUNT_BY_ID = SELECT COALESCE(SUM(w.amount), 0) AS total \
	FROM TWorkOrders w WHERE w.mechanic_id = (SELECT mechanic_id FROM TContracts \
	WHERE id = ?) AND w.date >= ? AND w.date < ?;

TPAYROLLS_GET_INVOICEDAMOUNT_MONTH = SELECT COALESCE(SUM(w.amount), 0) AS total \
  	FROM TWorkOrders w WHERE w.date >= ? AND w.date < ?;

TPAYROLLS_FIND_BY_CONTRACT_ID = SELECT * FROM TPAYROLLS \
    WHERE CONTRACT_ID = ? ORDER BY DATE DESC


# TCONTRACTTYPES
TCONTRACTTYPES_INSERT = INSERT INTO TCONTRACTTYPES \
    (ID, NAME, COMPENSATIONDAYSPERYEAR, VERSION, CREATEDAT, UPDATEDAT) \
    VALUES (?, ?, ?, ?, ?, ?)

TCONTRACTTYPES_DELETE = DELETE FROM TCONTRACTTYPES WHERE ID = ?

TCONTRACTTYPES_UPDATE = UPDATE TCONTRACTTYPES \
    SET COMPENSATIONDAYSPERYEAR = ?, UPDATEDAT = ?, VERSION = VERSION + 1 \
    WHERE ID = ? AND VERSION = ?

TCONTRACTTYPES_FIND_BY_ID = SELECT ID, NAME, COMPENSATIONDAYSPERYEAR, VERSION \
    FROM TCONTRACTTYPES WHERE ID = ?

TCONTRACTTYPES_FIND_BY_NAME = SELECT ID, NAME, COMPENSATIONDAYSPERYEAR, VERSION \
    FROM TCONTRACTTYPES WHERE NAME = ?

TCONTRACTTYPES_FIND_ALL = SELECT ID, NAME, COMPENSATIONDAYSPERYEAR, VERSION \
    FROM TCONTRACTTYPES ORDER BY NAME

TCONTRACTTYPES_COUNT_CONTRACTS = SELECT COUNT(*) FROM TCONTRACTS \
    WHERE CONTRACTTYPE_ID = ?

# TCONTRACTS
TCONTRACTS_INSERT = INSERT INTO TCONTRACTS \
    (ID, MECHANIC_ID, CONTRACTTYPE_ID, PROFESSIONALGROUP_ID, VERSION, STARTDATE, \
    ENDDATE, ANNUALBASESALARY, TAXRATE, SETTLEMENT, STATE, CREATEDAT, UPDATEDAT) \
    VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)

TCONTRACTS_DELETE = DELETE FROM TCONTRACTS WHERE ID = ?

TCONTRACTS_UPDATE = UPDATE TCONTRACTS \
    SET ENDDATE = ?, ANNUALBASESALARY = ?, SETTLEMENT = ?, \
        STATE = ?, UPDATEDAT = ?, VERSION = VERSION + 1 \
    WHERE ID = ? AND VERSION = ?

TCONTRACTS_FIND_BY_ID = SELECT ID, VERSION, MECHANIC_ID, CONTRACTTYPE_ID, \
    PROFESSIONALGROUP_ID, STARTDATE, ENDDATE, ANNUALBASESALARY, TAXRATE, \
    SETTLEMENT, STATE FROM TCONTRACTS WHERE ID = ?

TCONTRACTS_FIND_ALL = SELECT ID, VERSION, MECHANIC_ID, CONTRACTTYPE_ID, \
	PROFESSIONALGROUP_ID, STARTDATE, ENDDATE, ANNUALBASESALARY, TAXRATE, \
	SETTLEMENT, STATE FROM TCONTRACTS ORDER BY STARTDATE DESC

TCONTRACTS_FIND_BY_MECHANIC_NIF = SELECT c.id, m.nif, c.settlement, c.state, \
	COUNT(p.id) AS numPayrolls FROM TContracts c JOIN TMechanics m ON \
	c.mechanic_id = m.id LEFT JOIN TPayrolls p ON p.contract_id = c.id \
	WHERE m.nif = ? GROUP BY c.id, m.nif, c.settlement, c.state
	
TCONTRACTS_FIND_INFORCE_BY_MECHANIC_ID = SELECT ID, VERSION, MECHANIC_ID, \
    CONTRACTTYPE_ID, PROFESSIONALGROUP_ID, STARTDATE, ENDDATE, \
    ANNUALBASESALARY, TAXRATE, SETTLEMENT, STATE \
    FROM TCONTRACTS WHERE MECHANIC_ID = ? AND STATE = 'IN_FORCE'

TCONTRACTS_COUNT_PAYROLLS = SELECT COUNT(*) FROM TPAYROLLS \
    WHERE CONTRACT_ID = ?
    